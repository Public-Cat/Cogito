# Cloudflare Tunnel ingress config for Cogito.
#
# Publishes ONLY the public hostname (cogito.example.com) to Caddy.
# cogito.home.arpa is DELIBERATELY ABSENT from this ingress list — it is
# LAN-only and must NEVER be tunneled to the internet. The only gate on the
# public hostname is the in-app SESSION_CODE (see deploy/DEPLOY.md); do not
# rely on hostname secrecy alone.
#
# Replace <TUNNEL_ID> with your tunnel's UUID (from `cloudflared tunnel create`)
# and cogito.example.com with your real domain. Place this file at
# /etc/cloudflared/config.yml (or wherever `cloudflared` expects it) on the host.

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  # Public vhost only. This targets wherever your OWN existing Caddy
  # instance publishes 443 (this repo does not run Caddy) — Caddy then
  # reverse-proxies to the `cogito` container over the shared `cogito-net`
  # Docker network (see deploy/DEPLOY.md section 3).
  - hostname: cogito.example.com
    service: https://localhost:443      # Caddy; use noTLSVerify if Caddy uses internal CA
    originRequest:
      noTLSVerify: true

  # Catch-all: anything not explicitly matched above is rejected. This is
  # what keeps cogito.home.arpa (and everything else) off the public internet.
  - service: http_status:404
