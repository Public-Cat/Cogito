services:
  cogito:
    container_name: cogito
    build: .
    networks:
      - caddy-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://192.168.1.30:11434
      - PORT=3000
      # HOST controls which interface the Node process binds inside the
      # container — it does NOT make this safe to expose on the LAN/WAN.
      # No port is published to the host at all: the only access path is
      # the shared `caddy-net` network below, and only your own Caddy
      # container should be attached to it alongside this one.
      - HOST=0.0.0.0
      # SECURITY: set a real secret here (or via a .env file) before going
      # live — this placeholder is public knowledge. Rotate by changing the
      # value and running `docker compose up -d`.
      - SESSION_CODE=changeme
      # SECURITY: replace with your real public + LAN vhost URLs (must match
      # the vhost blocks you add to your own Caddyfile — see deploy/DEPLOY.md).
      # Comma-separated, no spaces.
      - ALLOWED_ORIGINS=https://cogito.example.com,https://cogito.home.arpa
    restart: unless-stopped

networks:
  # External network already used by your own Caddy container/stack — this
  # repo does not create or manage Caddy. Set `name` to whatever network
  # your Caddy container is already on (see deploy/DEPLOY.md section 3 for
  # how to find it), then attach Cogito to it so Caddy can reach it by
  # container name (`cogito:3000`).
  caddy-net:
    external: true
    name: <your-existing-caddy-network>
