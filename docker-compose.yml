services:
  cogito:
    container_name: cogito
    build: .
    networks:
      - cogito-net   
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://192.168.1.30:11434
      - PORT=3000
    ports:
      - 3008:3000
    
    restart: unless-stopped

networks:
  cogito-net:
    name: cogito-net
    driver: bridge
