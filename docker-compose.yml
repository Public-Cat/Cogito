services:
  cogito:
    container_name: cogito
    build: .
    ports:
      - "192.168.1.32:3000:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://192.168.1.30:11434
      - PORT=3000
    networks:
      - cogito-net
    restart: unless-stopped

networks:
  cogito-net:
    name: cogito-net
    driver: bridge
