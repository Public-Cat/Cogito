services:
  cogito:
    container_name: cogito
    build: .
    networks:
      - cogito-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://192.168.1.30:11434
      - PORT=3000
      # HOST controls which interface the Node process binds inside the
      # container — it does NOT make this safe to expose on the LAN/WAN.
      # No port is published to the host at all: the only access path is
      # the `cogito-net` network below. Connect your own Caddy container to
      # `cogito-net` (see deploy/DEPLOY.md section 3) — don't attach
      # anything else to it.
      - HOST=0.0.0.0
      # SECURITY: set a real secret here (or via a .env file) before going
      # live — this placeholder is public knowledge. Rotate by changing the
      # value and running `docker compose up -d`.
      - SESSION_CODE=changeme
      # SECURITY: set ALLOWED_ORIGINS in a .env file next to this compose file
      # (copy .env.example) — must match the vhost blocks you add to your own
      # Caddyfile (see deploy/DEPLOY.md). Comma-separated, no spaces.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    restart: unless-stopped

networks:
  # This repo does not create or manage Caddy — it just defines the network
  # Caddy needs to join to reach Cogito by container name (`cogito:3000`).
  # See deploy/DEPLOY.md section 3 for how to attach your existing Caddy
  # container to this network.
  cogito-net:
    name: cogito-net
    driver: bridge
